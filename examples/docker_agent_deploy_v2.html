<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker容器本地部署AI Agent完全指南</title>
<script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#0d0d16; color:#ccc; overflow:hidden; }

/* ── Top bar ── */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  padding:10px 20px;
  background:rgba(14,14,24,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
#topbar .logo { font-size:15px; font-weight:600; color:#fff; margin-right:16px; white-space:nowrap; max-width:260px; overflow:hidden; text-overflow:ellipsis; }
.mode-btn {
  padding:7px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
  background:transparent; color:#999; font-size:13px; cursor:pointer;
  transition:all 0.2s;
}
.mode-btn:hover { color:#ddd; border-color:rgba(255,255,255,0.25); }
.mode-btn.active { background:rgba(100,140,255,0.18); border-color:rgba(100,140,255,0.45); color:#c0d0ff; }
#search {
  margin-left:auto; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08); border-radius:8px;
  padding:8px 14px; color:#ddd; font-size:13px; width:220px; outline:none;
}
#search:focus { border-color:rgba(100,140,255,0.4); }
#search::placeholder { color:#555; }

/* ── Panel ── */
#panel {
  position:fixed; left:0; top:48px; bottom:0; width:260px; z-index:15;
  background:rgba(14,14,24,0.9); backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,0.06);
  padding:20px 16px; overflow-y:auto;
  transform:translateX(-100%); transition:transform 0.25s ease;
}
#panel.visible { transform:translateX(0); }
#panel h3 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px; }
#panel .layer-row {
  display:flex; align-items:center; gap:10px; padding:8px 6px;
  border-radius:6px; cursor:pointer; font-size:13px; color:#bbb;
  transition:background 0.15s;
}
#panel .layer-row:hover { background:rgba(255,255,255,0.03); }
#panel .layer-row input { accent-color:#648cff; }
#panel .layer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
#panel .layer-count { margin-left:auto; font-size:11px; color:#555; }
#panel .panel-actions { display:flex; gap:8px; margin-top:14px; }
#panel .panel-actions button {
  flex:1; padding:6px 0; border-radius:6px; border:1px solid rgba(255,255,255,0.08);
  background:transparent; color:#888; font-size:11px; cursor:pointer;
}
#panel .panel-actions button:hover { color:#ccc; border-color:rgba(255,255,255,0.2); }
#panel .explore-info { font-size:12px; color:#666; line-height:1.6; margin-bottom:14px; }
#panel .explore-actions { display:flex; gap:8px; }
#panel .explore-actions button {
  flex:1; padding:7px 0; border-radius:6px; border:1px solid rgba(255,255,255,0.1);
  background:rgba(100,140,255,0.1); color:#aac; font-size:12px; cursor:pointer;
}
#panel .explore-actions button:hover { background:rgba(100,140,255,0.22); }

/* ── Network ── */
#mynetwork { width:100vw; height:100vh; }

/* ── Detail sidebar ── */
#sidebar {
  position:fixed; right:0; top:0; width:360px; height:100vh;
  background:rgba(16,16,28,0.96); backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,0.08);
  padding:32px 24px; overflow-y:auto; z-index:25;
  transform:translateX(100%); transition:transform 0.3s ease;
}
#sidebar.open { transform:translateX(0); }
#sidebar h2 { font-size:22px; margin-bottom:6px; color:#fff; }
#sidebar .category { font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:#888; margin-bottom:14px; }
#sidebar .description { font-size:15px; line-height:1.7; color:#bbb; margin-bottom:20px; }
#sidebar .related h3 { font-size:13px; color:#777; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.08em; }
#sidebar .related .rel-item {
  display:flex; align-items:center; gap:8px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.04); font-size:14px; color:#aaa;
}
#sidebar .related .rel-item .rel-dir { color:#555; font-size:11px; min-width:16px; }
#sidebar .related .rel-item .rel-label { color:#666; font-size:12px; }
#close-btn {
  position:absolute; top:14px; right:14px;
  background:none; border:none; color:#888; font-size:20px;
  cursor:pointer; width:32px; height:32px; display:flex;
  align-items:center; justify-content:center; border-radius:50%;
}
#close-btn:hover { color:#fff; background:rgba(255,255,255,0.05); }

/* ── Focus indicator ── */
#focus-indicator {
  position:fixed; top:58px; left:50%; transform:translateX(-50%); z-index:18;
  background:rgba(100,140,255,0.15); border:1px solid rgba(100,140,255,0.3);
  color:#aac; font-size:13px; padding:8px 18px; border-radius:20px;
  pointer-events:none; opacity:0; transition:opacity 0.3s;
}
#focus-indicator.show { opacity:1; }

/* ── Legend ── */
#legend {
  position:fixed; bottom:20px; left:20px; z-index:10;
  display:flex; gap:14px; flex-wrap:wrap;
  background:rgba(16,16,28,0.88); backdrop-filter:blur(10px);
  border-radius:10px; padding:10px 14px;
  border:1px solid rgba(255,255,255,0.06);
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#888; }
.legend-dot { width:9px; height:9px; border-radius:50%; }

/* ── Export button ── */
#export-btn {
  position:fixed; bottom:20px; right:20px; z-index:10;
  background:rgba(100,140,255,0.15); border:1px solid rgba(100,140,255,0.25);
  color:#aac; border-radius:7px; padding:7px 14px;
  font-size:12px; cursor:pointer;
}
#export-btn:hover { background:rgba(100,140,255,0.3); }

/* ── Explore badges ── */
.explore-badge {
  position:absolute; top:-8px; right:-8px;
  background:rgba(100,140,255,0.8); color:#fff;
  font-size:10px; min-width:18px; height:18px; line-height:18px;
  text-align:center; border-radius:9px; padding:0 5px;
  pointer-events:none;
}

/* Animation for newly revealed nodes */
@keyframes fadeInScale {
  from { opacity:0; transform:scale(0.3); }
  to { opacity:1; transform:scale(1); }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <span class="logo">Docker容器本地部署AI Agent完全指南</span>
  <button class="mode-btn active" onclick="switchMode('layer')" id="btn-layer">图层</button>
  <button class="mode-btn" onclick="switchMode('focus')" id="btn-focus">焦点</button>
  <button class="mode-btn" onclick="switchMode('explore')" id="btn-explore">探索</button>
  <input id="search" type="text" placeholder="搜索概念..." />
</div>

<!-- Layer Panel (mode 1) -->
<div id="panel" class="visible"></div>

<!-- Focus indicator -->
<div id="focus-indicator">点击空白处退出焦点</div>

<!-- Network -->
<div id="mynetwork"></div>

<!-- Detail sidebar -->
<div id="sidebar">
  <button id="close-btn" onclick="closeSidebar()">&times;</button>
  <h2 id="node-name"></h2>
  <div class="category" id="node-category"></div>
  <div class="description" id="node-desc"></div>
  <div class="related">
    <h3>关联概念</h3>
    <div id="node-related"></div>
  </div>
</div>

<!-- Legend -->
<div id="legend"></div>
<button id="export-btn" onclick="exportPNG()">导出 PNG</button>

<script>
var data = {"nodes": [{"id": "c1", "label": "Docker Model Runner", "title": "<b>Docker Model Runner</b><br>Docker推出的本地运行LLM模型的工具，兼容OpenAI API，支持拉取和运行多种AI模型。<br><i>实际应用</i>", "group": "application", "value": 20, "desc": "Docker推出的本地运行LLM模型的工具，兼容OpenAI API，支持拉取和运行多种AI模型。", "category": "application", "difficulty": "intermediate"}, {"id": "c2", "label": "Docker MCP Gateway", "title": "<b>Docker MCP Gateway</b><br>通过Model Context Protocol连接外部工具和服务的网关，使AI Agent能够调用搜索、文件系统等工具。<br><i>实际应用</i>", "group": "application", "value": 20, "desc": "通过Model Context Protocol连接外部工具和服务的网关，使AI Agent能够调用搜索、文件系统等工具。", "category": "application", "difficulty": "intermediate"}, {"id": "c3", "label": "Docker cagent", "title": "<b>Docker cagent</b><br>声明式YAML多Agent运行时，无需手写代码即可定义和运行AI Agent。<br><i>实际应用</i>", "group": "application", "value": 12, "desc": "声明式YAML多Agent运行时，无需手写代码即可定义和运行AI Agent。", "category": "application", "difficulty": "basic"}, {"id": "c4", "label": "Docker Offload", "title": "<b>Docker Offload</b><br>提供GPU加速云端环境，用于增强本地AI Agent的计算能力。<br><i>实际应用</i>", "group": "application", "value": 30, "desc": "提供GPU加速云端环境，用于增强本地AI Agent的计算能力。", "category": "application", "difficulty": "advanced"}, {"id": "c5", "label": "Docker Compose", "title": "<b>Docker Compose</b><br>定义和运行多容器AI应用的统一编排工具，用于集成模型、工具网关和Web界面。<br><i>实际应用</i>", "group": "application", "value": 20, "desc": "定义和运行多容器AI应用的统一编排工具，用于集成模型、工具网关和Web界面。", "category": "application", "difficulty": "intermediate"}, {"id": "c6", "label": "本地模型", "title": "<b>本地模型</b><br>在本地Docker环境中运行的AI模型，如ai/smollm2、ai/gemma3、ai/llama3.2等，各有不同的硬件需求。<br><i>概念定义</i>", "group": "definition", "value": 12, "desc": "在本地Docker环境中运行的AI模型，如ai/smollm2、ai/gemma3、ai/llama3.2等，各有不同的硬件需求。", "category": "definition", "difficulty": "basic"}, {"id": "c7", "label": "MCP协议", "title": "<b>MCP协议</b><br>Model Context Protocol，用于连接AI Agent与外部工具的通信协议，支持duckduckgo、filesystem等工具。<br><i>原理规律</i>", "group": "principle", "value": 20, "desc": "Model Context Protocol，用于连接AI Agent与外部工具的通信协议，支持duckduckgo、filesystem等工具。", "category": "principle", "difficulty": "intermediate"}, {"id": "c8", "label": "YAML声明式Agent", "title": "<b>YAML声明式Agent</b><br>通过YAML文件定义Agent的角色、模型、指令和工具集，无需编写代码即可创建多Agent系统。<br><i>例子案例</i>", "group": "example", "value": 12, "desc": "通过YAML文件定义Agent的角色、模型、指令和工具集，无需编写代码即可创建多Agent系统。", "category": "example", "difficulty": "basic"}, {"id": "c9", "label": "多Agent协作", "title": "<b>多Agent协作</b><br>多个AI Agent（如审查者、批评者、修订者）协同工作，完成复杂任务。<br><i>原理规律</i>", "group": "principle", "value": 30, "desc": "多个AI Agent（如审查者、批评者、修订者）协同工作，完成复杂任务。", "category": "principle", "difficulty": "advanced"}, {"id": "c10", "label": "硬件要求", "title": "<b>硬件要求</b><br>运行不同AI模型所需的显存和存储空间，从轻量模型（1GB显存）到高端模型（16GB以上显存）。<br><i>其他</i>", "group": "other", "value": 12, "desc": "运行不同AI模型所需的显存和存储空间，从轻量模型（1GB显存）到高端模型（16GB以上显存）。", "category": "other", "difficulty": "basic"}, {"id": "c11", "label": "安全沙盒", "title": "<b>安全沙盒</b><br>Agent生成的代码在隔离容器中运行，可禁用网络以防止数据泄露的安全机制。<br><i>原理规律</i>", "group": "principle", "value": 20, "desc": "Agent生成的代码在隔离容器中运行，可禁用网络以防止数据泄露的安全机制。", "category": "principle", "difficulty": "intermediate"}, {"id": "c12", "label": "混合AI模式", "title": "<b>混合AI模式</b><br>本地小模型处理常规任务，远程大模型处理复杂推理，可降低5至30倍成本的部署策略。<br><i>实际应用</i>", "group": "application", "value": 30, "desc": "本地小模型处理常规任务，远程大模型处理复杂推理，可降低5至30倍成本的部署策略。", "category": "application", "difficulty": "advanced"}, {"id": "c13", "label": "Goose框架", "title": "<b>Goose框架</b><br>开源AI助手框架，结合Docker Model Runner和MCP Gateway，快速构建带浏览器界面的私有AI助手。<br><i>实际应用</i>", "group": "application", "value": 20, "desc": "开源AI助手框架，结合Docker Model Runner和MCP Gateway，快速构建带浏览器界面的私有AI助手。", "category": "application", "difficulty": "intermediate"}, {"id": "c14", "label": "学习路径", "title": "<b>学习路径</b><br>从安装Docker Desktop、拉取轻量模型、使用cagent体验零代码Agent，到学习完整多Agent架构的推荐步骤。<br><i>流程步骤</i>", "group": "process", "value": 12, "desc": "从安装Docker Desktop、拉取轻量模型、使用cagent体验零代码Agent，到学习完整多Agent架构的推荐步骤。", "category": "process", "difficulty": "basic"}], "edges": [{"id": "c1_c6", "from": "c1", "to": "c6", "label": "运行本地模型", "arrows": "to", "relType": "relates_to"}, {"id": "c1_c2", "from": "c1", "to": "c2", "label": "工具链组成部分", "arrows": "to", "relType": "part_of"}, {"id": "c3_c8", "from": "c3", "to": "c8", "label": "使用YAML声明式定义", "arrows": "to", "relType": "example_of"}, {"id": "c3_c9", "from": "c3", "to": "c9", "label": "支持多Agent协作", "arrows": "to", "relType": "leads_to"}, {"id": "c2_c7", "from": "c2", "to": "c7", "label": "基于MCP协议", "arrows": "to", "relType": "relates_to"}, {"id": "c5_c1", "from": "c5", "to": "c1", "label": "编排模型服务", "arrows": "to", "relType": "part_of"}, {"id": "c5_c2", "from": "c5", "to": "c2", "label": "编排工具网关", "arrows": "to", "relType": "part_of"}, {"id": "c6_c10", "from": "c6", "to": "c10", "label": "依赖硬件要求", "arrows": "to", "relType": "relates_to"}, {"id": "c11_c9", "from": "c11", "to": "c9", "label": "保障多Agent安全", "arrows": "to", "relType": "prerequisite_of"}, {"id": "c12_c1", "from": "c12", "to": "c1", "label": "结合本地和远程模型", "arrows": "to", "relType": "relates_to"}, {"id": "c13_c1", "from": "c13", "to": "c1", "label": "集成Model Runner", "arrows": "to", "relType": "relates_to"}, {"id": "c13_c2", "from": "c13", "to": "c2", "label": "集成MCP Gateway", "arrows": "to", "relType": "relates_to"}, {"id": "c14_c1", "from": "c14", "to": "c1", "label": "先启用Model Runner", "arrows": "to", "relType": "prerequisite_of"}, {"id": "c14_c3", "from": "c14", "to": "c3", "label": "体验cagent", "arrows": "to", "relType": "leads_to"}, {"id": "c14_c5", "from": "c14", "to": "c5", "label": "学习Compose架构", "arrows": "to", "relType": "leads_to"}]};
var groupNames = {"definition": "概念定义", "principle": "原理规律", "example": "例子案例", "application": "实际应用", "theory": "理论学派", "person": "人物学者", "event": "历史事件", "process": "流程步骤", "other": "其他"};
var groupColors = {"definition": "#5b9bd5", "principle": "#ed7d31", "example": "#70ad47", "application": "#ffc000", "theory": "#9b59b6", "person": "#e74c3c", "event": "#1abc9c", "process": "#3498db", "other": "#95a5a6"};
var entryNodeIds = new Set(["c11", "c4", "c3", "c12", "c14", "c6", "c13", "c8", "c10"]);
var adjacencyMap = {"c1": ["c6", "c2", "c5", "c12", "c13", "c14"], "c2": ["c1", "c7", "c5", "c13"], "c3": ["c8", "c9", "c14"], "c4": [], "c5": ["c1", "c2", "c14"], "c6": ["c1", "c10"], "c7": ["c2"], "c8": ["c3"], "c9": ["c3", "c11"], "c10": ["c6"], "c11": ["c9"], "c12": ["c1"], "c13": ["c1", "c2"], "c14": ["c1", "c3", "c5"]};

// ── State ──
var currentMode = 'layer';
var focusNodeId = null;
var expandedNodes = new Set(entryNodeIds);  // explore mode
var allNodes = data.nodes.slice();
var allEdges = data.edges.slice();

// ── vis.js Network ──
var container = document.getElementById('mynetwork');
var baseOptions = {
  nodes: {
    shape: "dot", size: 20,
    font: { size:14, color:"#ccc", face:"-apple-system, sans-serif" },
    borderWidth:2, shadow:{ enabled:true, size:8 },
  },
  edges: {
    width:1.5,
    color:{ color:"rgba(150,150,180,0.4)", highlight:"rgba(180,180,220,0.8)" },
    smooth:{ type:"continuous" },
    font:{ size:11, color:"#888", background:"rgba(13,13,22,0.7)" },
  },
  physics: {
    forceAtlas2Based: {
      gravitationalConstant:-50, centralGravity:0.01,
      springLength:200, springConstant:0.08,
    },
    maxVelocity:50, solver:"forceAtlas2Based",
    stabilization:{ iterations:200 },
  },
  interaction:{ hover:true, tooltipDelay:200, zoomView:true, dragView:true },
  groups: {"definition": {"color": {"background": "#5b9bd5", "border": "#5b9bd5", "highlight": {"background": "#5b9bd5", "border": "#5b9bd5"}}}, "principle": {"color": {"background": "#ed7d31", "border": "#ed7d31", "highlight": {"background": "#ed7d31", "border": "#ed7d31"}}}, "example": {"color": {"background": "#70ad47", "border": "#70ad47", "highlight": {"background": "#70ad47", "border": "#70ad47"}}}, "application": {"color": {"background": "#ffc000", "border": "#ffc000", "highlight": {"background": "#ffc000", "border": "#ffc000"}}}, "theory": {"color": {"background": "#9b59b6", "border": "#9b59b6", "highlight": {"background": "#9b59b6", "border": "#9b59b6"}}}, "person": {"color": {"background": "#e74c3c", "border": "#e74c3c", "highlight": {"background": "#e74c3c", "border": "#e74c3c"}}}, "event": {"color": {"background": "#1abc9c", "border": "#1abc9c", "highlight": {"background": "#1abc9c", "border": "#1abc9c"}}}, "process": {"color": {"background": "#3498db", "border": "#3498db", "highlight": {"background": "#3498db", "border": "#3498db"}}}, "other": {"color": {"background": "#95a5a6", "border": "#95a5a6", "highlight": {"background": "#95a5a6", "border": "#95a5a6"}}}},
};
var network = new vis.Network(container, data, baseOptions);

// ── Legend ──
(function() {
  var groups = {};
  allNodes.forEach(function(n) { groups[n.group] = (groups[n.group]||0)+1; });
  document.getElementById('legend').innerHTML = Object.keys(groups).map(function(g) {
    return '<div class="legend-item"><span class="legend-dot" style="background:'+(groupColors[g]||"#888")+'"></span>'+(groupNames[g]||g)+' ('+groups[g]+')</div>';
  }).join("");
})();

// ── Sidebar helpers ──
function openSidebar(node) {
  document.getElementById('node-name').textContent = node.label;
  document.getElementById('node-category').textContent = groupNames[node.group] || node.group;
  document.getElementById('node-desc').textContent = (node.desc || node.title || '').replace(/<[^>]*>/g, '');
  var related = allEdges.filter(function(e) { return e.from===node.id || e.to===node.id; });
  var html = related.map(function(e) {
    var otherId = e.from===node.id ? e.to : e.from;
    var other = allNodes.find(function(n){ return n.id===otherId; });
    return '<div class="rel-item"><span class="rel-dir">'+(e.from===node.id?'→':'←')+'</span><span class="rel-label">'+(e.label||'')+'</span> '+(other?other.label:otherId)+'</div>';
  }).join("");
  document.getElementById('node-related').innerHTML = html || "<div style='color:#555'>无关联概念</div>";
  document.getElementById('sidebar').classList.add('open');
}
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

// ═══════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════
function switchMode(mode) {
  currentMode = mode;
  focusNodeId = null;
  document.getElementById('focus-indicator').classList.remove('show');

  // Update buttons
  ['layer','focus','explore'].forEach(function(m) {
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });

  // Reset all nodes & edges to visible
  allNodes.forEach(function(n) { data.nodes.update({ id:n.id, hidden:false, size:baseOptions.nodes.size, opacity:1 }); });
  allEdges.forEach(function(e) { data.edges.update({ id:e.id, hidden:false, width:baseOptions.edges.width, color:baseOptions.edges.color }); });

  // Reset physics
  network.setOptions({ physics:{ enabled:true, forceAtlas2Based:baseOptions.physics.forceAtlas2Based } });
  network.fit({ animation:true });

  var panel = document.getElementById('panel');
  panel.classList.add('visible');

  if (mode === 'layer')   buildLayerPanel();
  if (mode === 'focus')   buildFocusPanel();
  if (mode === 'explore') { buildExplorePanel(); applyExploreVisibility(); }

  // Apply current search filter
  applySearch();
}

// ═══════════════════════════════════════════
// MODE 1: LAYER
// ═══════════════════════════════════════════
var layerVisibility = {};

function buildLayerPanel() {
  // Count by category
  var counts = {};
  allNodes.forEach(function(n) { counts[n.group] = (counts[n.group]||0)+1; });
  var cats = Object.keys(counts).sort();

  // Init visibility
  cats.forEach(function(c) { if (!(c in layerVisibility)) layerVisibility[c] = true; });

  var panel = document.getElementById('panel');
  panel.innerHTML = '<h3>图层筛选</h3>' +
    cats.map(function(c) {
      var color = groupColors[c] || '#888';
      var name = groupNames[c] || c;
      return '<label class="layer-row">' +
        '<input type="checkbox" '+(layerVisibility[c]?'checked':'')+' onchange="toggleLayer(''+c+'',this.checked)">' +
        '<span class="layer-dot" style="background:'+color+'"></span>' +
        name + '<span class="layer-count">'+counts[c]+'</span></label>';
    }).join("") +
    '<div class="panel-actions">' +
      '<button onclick="setAllLayers(true)">全部开启</button>' +
      '<button onclick="setAllLayers(false)">全部关闭</button>' +
    '</div>';
}

function toggleLayer(cat, visible) {
  layerVisibility[cat] = visible;
  applyLayerVisibility();
}

function setAllLayers(visible) {
  Object.keys(layerVisibility).forEach(function(c) { layerVisibility[c] = visible; });
  buildLayerPanel();
  applyLayerVisibility();
}

function applyLayerVisibility() {
  var hiddenCats = new Set(Object.keys(layerVisibility).filter(function(c) { return !layerVisibility[c]; }));
  allNodes.forEach(function(n) {
    data.nodes.update({ id:n.id, hidden:hiddenCats.has(n.group) });
  });
  // Hide edges connected to hidden nodes
  allEdges.forEach(function(e) {
    var fromHidden = hiddenCats.has((allNodes.find(function(n){ return n.id===e.from; })||{}).group);
    var toHidden = hiddenCats.has((allNodes.find(function(n){ return n.id===e.to; })||{}).group);
    data.edges.update({ id:e.id, hidden: fromHidden||toHidden });
  });
  applySearch();
}

// ═══════════════════════════════════════════
// MODE 2: FOCUS
// ═══════════════════════════════════════════
function buildFocusPanel() {
  document.getElementById('panel').innerHTML =
    '<h3>焦点探索</h3>' +
    '<p class="explore-info">点击任一概念节点，它会居中放大，关联概念环绕周围。点击空白处返回全景。</p>';
}

network.on('click', function(params) {
  if (currentMode === 'focus') {
    if (params.nodes.length > 0) {
      enterFocus(params.nodes[0]);
    } else {
      exitFocus();
    }
  }
  if (currentMode === 'explore') {
    if (params.nodes.length > 0) {
      toggleExploreNode(params.nodes[0]);
    }
  }
  // Open sidebar for any click on a node (all modes)
  if (params.nodes.length > 0) {
    var node = allNodes.find(function(n){ return n.id===params.nodes[0]; });
    if (node) openSidebar(node);
  }
});

function enterFocus(nodeId) {
  focusNodeId = nodeId;
  document.getElementById('focus-indicator').classList.add('show');

  var neighbors = new Set(adjacencyMap[nodeId] || []);
  neighbors.add(nodeId);

  // Freeze physics
  network.setOptions({ physics:{ enabled:false } });

  // Move focus node to center
  network.moveTo({ position:{x:0,y:0}, scale:1.2, animation:{ duration:500, easingFunction:"easeInOutQuad" } });

  // Resize & reposition nodes
  var neighborArr = Array.from(neighbors);
  var radius = 200;
  allNodes.forEach(function(n) {
    if (n.id === nodeId) {
      data.nodes.update({ id:n.id, size:50, opacity:1, font:{ size:18, color:"#fff" } });
    } else if (neighbors.has(n.id)) {
      data.nodes.update({ id:n.id, opacity:1, size:24 });
      // Orbit around focus node
      var idx = neighborArr.indexOf(n.id);
      var angle = (idx / Math.max(neighborArr.length-1,1)) * 2 * Math.PI;
      network.moveNode(n.id, Math.cos(angle)*radius, Math.sin(angle)*radius);
    } else {
      data.nodes.update({ id:n.id, opacity:0.12, size:10 });
    }
  });

  // Edge styling
  allEdges.forEach(function(e) {
    if (e.from===nodeId || e.to===nodeId) {
      data.edges.update({ id:e.id, width:3, color:{ color:"rgba(160,180,255,0.7)", highlight:"rgba(200,210,255,0.9)" }, hidden:false });
    } else {
      data.edges.update({ id:e.id, hidden:true });
    }
  });

  applySearch();
}

function exitFocus() {
  focusNodeId = null;
  document.getElementById('focus-indicator').classList.remove('show');

  // Restore
  allNodes.forEach(function(n) {
    data.nodes.update({ id:n.id, size:baseOptions.nodes.size, opacity:1, font:{ size:14, color:"#ccc" } });
  });
  allEdges.forEach(function(e) {
    data.edges.update({ id:e.id, width:baseOptions.edges.width, color:baseOptions.edges.color, hidden:false });
  });
  network.setOptions({ physics:{ enabled:true, forceAtlas2Based:baseOptions.physics.forceAtlas2Based } });
  network.fit({ animation:{ duration:600, easingFunction:"easeInOutQuad" } });
  applySearch();
}

// ═══════════════════════════════════════════
// MODE 3: EXPLORE
// ═══════════════════════════════════════════
var unexpandedBadges = {};  // nodeId -> count of hidden neighbors

function buildExplorePanel() {
  document.getElementById('panel').innerHTML =
    '<h3>渐进探索</h3>' +
    '<p class="explore-info">从入口概念开始，点击节点逐步展开关联。+"N"表示还有未展开的连接。</p>' +
    '<div class="explore-actions">' +
      '<button onclick="expandAllNodes()">全部展开</button>' +
      '<button onclick="resetExplore()">重置</button>' +
    '</div>';
}

function applyExploreVisibility() {
  // Show only expanded nodes
  allNodes.forEach(function(n) {
    data.nodes.update({ id:n.id, hidden:!expandedNodes.has(n.id) });
  });
  allEdges.forEach(function(e) {
    data.edges.update({ id:e.id, hidden:!expandedNodes.has(e.from) || !expandedNodes.has(e.to) });
  });

  // Calculate badges
  allNodes.forEach(function(n) {
    if (!expandedNodes.has(n.id)) return;
    var hiddenNeighbors = (adjacencyMap[n.id]||[]).filter(function(adj) {
      return !expandedNodes.has(adj);
    }).length;
    if (hiddenNeighbors > 0) {
      data.nodes.update({ id:n.id, label:n.label+' +'+hiddenNeighbors });
    } else {
      data.nodes.update({ id:n.id, label:n.label });
    }
  });

  network.fit({ animation:{ duration:400, easingFunction:"easeInOutQuad" } });
  applySearch();
}

function toggleExploreNode(nodeId) {
  if (!expandedNodes.has(nodeId)) return;  // shouldn't happen in click handler

  var hiddenNeighbors = (adjacencyMap[nodeId]||[]).filter(function(adj) {
    return !expandedNodes.has(adj);
  });

  if (hiddenNeighbors.length > 0) {
    // Expand: reveal hidden neighbors
    hiddenNeighbors.forEach(function(adj) { expandedNodes.add(adj); });
  } else {
    // Already fully expanded — could collapse, but let's keep it simple for now
  }
  applyExploreVisibility();
}

function expandAllNodes() {
  allNodes.forEach(function(n) { expandedNodes.add(n.id); });
  applyExploreVisibility();
}

function resetExplore() {
  expandedNodes = new Set(entryNodeIds);
  applyExploreVisibility();
}

// ═══════════════════════════════════════════
// SEARCH (all modes)
// ═══════════════════════════════════════════
var searchQuery = '';

document.getElementById('search').addEventListener('input', function(e) {
  searchQuery = e.target.value.toLowerCase();
  applySearch();
});

function applySearch() {
  if (!searchQuery) {
    // Reset any search-only hiding — layer/focus/explore modes each re-apply
    if (currentMode === 'layer')   applyLayerVisibility();
    if (currentMode === 'focus' && focusNodeId)   enterFocus(focusNodeId);
    if (currentMode === 'focus' && !focusNodeId)  exitFocus();
    if (currentMode === 'explore') applyExploreVisibility();
    return;
  }

  // In search mode: show matching nodes, hide non-matching
  var matched = new Set();
  allNodes.forEach(function(n) {
    if (n.label.toLowerCase().includes(searchQuery) || (n.desc||'').toLowerCase().includes(searchQuery)) {
      matched.add(n.id);
    }
  });

  allNodes.forEach(function(n) {
    var alreadyHidden = false;
    // Check if node was already hidden by current mode
    if (currentMode === 'layer') {
      var cat = n.group;
      if (cat in layerVisibility && !layerVisibility[cat]) alreadyHidden = true;
    }
    if (currentMode === 'focus' && focusNodeId) {
      var neighbors = new Set(adjacencyMap[focusNodeId]||[]); neighbors.add(focusNodeId);
      if (!neighbors.has(n.id)) alreadyHidden = true;
    }
    if (currentMode === 'explore') {
      if (!expandedNodes.has(n.id)) alreadyHidden = true;
    }
    data.nodes.update({ id:n.id, hidden:alreadyHidden || !matched.has(n.id) });
  });

  allEdges.forEach(function(e) {
    var fromNode = allNodes.find(function(n){ return n.id===e.from; });
    var toNode = allNodes.find(function(n){ return n.id===e.to; });
    if (!fromNode || !toNode) return;
    data.edges.update({ id:e.id, hidden:!matched.has(e.from) || !matched.has(e.to) });
  });
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function exportPNG() {
  var canvas = document.querySelector('#mynetwork canvas');
  if (!canvas) { alert('无法导出'); return; }
  var link = document.createElement('a');
  link.download = 'Docker容器本地部署AI Agent完全指南.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeSidebar(); if (currentMode==='focus') exitFocus(); }
});

// Init: build layer panel on load
buildLayerPanel();
</script>
</body>
